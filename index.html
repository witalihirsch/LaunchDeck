<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaunchDeck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c1119;
      --card: rgba(12, 20, 31, 0.72);
      --text: #f3f6fb;
      --muted: #9ba8bc;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #8ed6ff;
      --accent-2: #c7f2ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Manrope", sans-serif;
      background: radial-gradient(130% 120% at 10% 0%, #1e334f 0%, transparent 52%),
                  radial-gradient(100% 100% at 100% 100%, #173048 0%, transparent 45%),
                  var(--bg);
      color: var(--text);
    }

    body {
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      backdrop-filter: blur(10px);
      padding: 40px 34px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(36px, 6vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 auto 28px;
      max-width: 38ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .actions,
    .purchase-options {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .purchase-options {
      margin-top: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn:active {
      transform: translateY(0);
    }

    .download {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041321;
    }

    .buy {
      background: transparent;
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.28);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>LaunchDeck</h1>
    <p>Fast macOS launcher with a clean overlay and quick access workflows.</p>

    <div class="actions">
      <a class="btn download" href="https://github.com/witalihirsch/LaunchDeck/releases/latest">Download</a>
    </div>

    <div class="purchase-options">
      <a class="btn buy" href="https://buy.polar.sh/polar_cl_UextDdEdzlmqKYYPzjvdeUb5M4XU6GCq5b7Vk1QPwZB" target="_blank" rel="noopener noreferrer">Buy for 1 device</a>
      <a class="btn buy" href="https://buy.polar.sh/polar_cl_nqtM1cfA3S8By9rASvegz9nNNMUbBPl35DlD31vHT2u" target="_blank" rel="noopener noreferrer">Buy for 2 devices</a>
      <a class="btn buy" href="https://buy.polar.sh/polar_cl_S6jWkajmccQISoDK56zyIvlZb2mL3NXnWQGwD3ep9cf" target="_blank" rel="noopener noreferrer">Buy for 5 devices</a>
    </div>
  </main>
</body>
</html>
